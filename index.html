<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spines — a small library</title>
<meta name="description" content="A quiet library of original novels." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css" />
<script>
  // Set theme before paint to avoid flash
  (function() {
    var t = localStorage.getItem("spines:theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>

<div class="container">
  <div class="topbar">
    <div class="brand">Spines <small>a small library</small></div>
    <div class="topbar-controls">
      <button class="icon-btn" id="theme-toggle" title="Toggle dark / light" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </div>
  </div>

  <div class="hero">
    <div class="hero-eyebrow">15 novels, one shelf</div>
    <h1>Pull a book off the shelf and start reading.</h1>
    <p>Your place is saved automatically, and every spine shows how far you've gotten. Everything here stays on this device — nothing is uploaded anywhere.</p>
  </div>

  <div id="shelves"></div>
</div>

<footer class="site-footer">Spines — reading picks up right where you left it.</footer>

<script src="scripts/app.js"></script>
<script src="scripts/library.js"></script>
</body>
</html>
