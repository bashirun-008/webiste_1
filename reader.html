<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Spines</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css" />
<script>
  (function() {
    var t = localStorage.getItem("spines:theme") || "dark";
    document.documentElement.setAttribute("data-theme", t);
  })();
</script>
</head>
<body>

<div class="reader-progress-track"><div class="reader-progress-fill" id="scroll-fill"></div></div>

<div class="reader-bar">
  <div class="reader-bar-inner">
    <a class="icon-btn" id="back-link" href="index.html" title="Back to book" aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="reader-bar-title" id="reader-title"></div>
    <div class="topbar-controls">
      <div class="font-controls">
        <button id="font-down" aria-label="Decrease text size">A-</button>
        <button id="font-up" aria-label="Increase text size">A+</button>
      </div>
      <button class="icon-btn" id="bookmark-btn" title="Bookmark this spot" aria-label="Add bookmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12v18l-6-4-6 4V3z"/></svg>
      </button>
      <button class="icon-btn" id="theme-toggle" title="Toggle dark / light" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
    </div>
  </div>
</div>

<article class="reader-content" id="reader-content"></article>
<div class="reader-nav" id="reader-nav"></div>

<script src="scripts/app.js"></script>
<script src="scripts/reader.js"></script>
</body>
</html>
